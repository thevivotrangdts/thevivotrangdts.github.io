baseURL: https://gdts.vn/
title: GDTS
copyright: "© Copyright GDTS. All Rights Reserved"

# Use .html extensions to preserve existing URL structure
uglyURLs: true

# Default language is Vietnamese at root (no /vi/ prefix)
defaultContentLanguage: vi
defaultContentLanguageInSubdir: false

# Allow raw HTML inside markdown content files
markup:
  goldmark:
    renderer:
      unsafe: true

# Separate content directories per language
languages:
  vi:
    languageName: Tiếng Việt
    weight: 1
    contentDir: content/vi
    params:
      googleVerification: KbWQ9GYep_RGE0N1o48UhE0hx4xNmBMK9KhlkvswpWo
  en:
    languageName: English
    weight: 2
    contentDir: content/en
    params:
      googleVerification: KbWQ9GYep_RGE0N1o48UhE0hx4xNmBMK9KhlkvswpWo

params:
  googleVerification: KbWQ9GYep_RGE0N1o48UhE0hx4xNmBMK9KhlkvswpWo

# Disable unused taxonomy pages
disableKinds:
  - taxonomy
  - term
