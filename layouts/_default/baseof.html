<!DOCTYPE html>
<html lang="{{ .Lang }}">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <meta name="google-site-verification" content="{{ .Site.Params.googleVerification }}" />

  <title>{{ block "title" . }}{{ .Title }} - GDTS{{ end }}</title>
  <meta content="{{ .Params.description | default .Site.Params.description }}" name="description">
  {{- with .Params.keywords }}
  <meta content="{{ . }}" name="keywords">
  {{- end }}

  {{- block "head-extra" . }}{{ end }}

  <!-- Favicons -->
  <link href="/assets/img/gdts.png" rel="icon">
  <link href="/assets/img/gdts.png" rel="apple-touch-icon">
  <link href="/assets/img/gdts.png" rel="shortcut icon">
  <link href="/assets/img/gdts.png" rel="image_src">

  <!-- Vendor CSS -->
  <link href="/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/vendor/icofont/icofont.min.css" rel="stylesheet">
  <link href="/assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">

  <!-- Main CSS -->
  <link href="/assets/css/style.css" rel="stylesheet">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:title" content="{{ .Title }} - GDTS">
  <meta property="og:description" content="{{ .Params.description | default .Site.Params.description }}">
  <meta property="og:image" content="https://gdts.vn/assets/img/hero-bg.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Title }} - GDTS">
  <meta name="twitter:description" content="{{ .Params.description | default .Site.Params.description }}">
  <meta name="twitter:image" content="https://gdts.vn/assets/img/hero-bg.webp">

  <!-- Hreflang for multilingual SEO -->
  <link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}">
  {{- range .Translations }}
  <link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}">
  {{- end }}
  <link rel="alternate" hreflang="x-default" href="{{ .Permalink }}">
</head>

<body>

  <!-- ======= Top Bar ======= -->
  {{ partial "topbar.html" . }}

  <!-- ======= Header ======= -->
  {{ partial "nav.html" . }}

  {{- block "main" . }}{{ end }}

  <!-- ======= Footer ======= -->
  {{ partial "footer.html" . }}

  <a href="#" class="back-to-top"><i class="icofont-simple-up"></i></a>

  <!-- Vendor JS -->
  <script src="/assets/vendor/jquery/jquery.min.js"></script>
  <script src="/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/vendor/jquery.easing/jquery.easing.min.js"></script>

  <!-- Main JS -->
  <script src="/assets/js/main.js"></script>

</body>
</html>
